<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0B0A09; }
  </style>
</helmet>

<div style="width: 1200px; height: 630px; box-sizing: border-box; background: #12100E; color: #FAF9F6; font-family: 'Instrument Sans', sans-serif; position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 60px 72px;">

  <!-- top row -->
  <div style="display: flex; align-items: center; justify-content: space-between;">
    <div style="display: flex; align-items: center; gap: 12px;">
      <span style="display: block; width: 26px; height: 1px; background: {{ accent }};"></span>
      <span style="font-family: 'IBM Plex Mono', monospace; font-size: 16px; letter-spacing: 0.26em; color: rgba(250,249,246,0.6);">AI PRODUCT MANAGER</span>
    </div>
    <span style="font-family: 'IBM Plex Mono', monospace; font-size: 14px; letter-spacing: 0.14em; color: rgba(250,249,246,0.38);">REMOTE · 2026</span>
  </div>

  <!-- headline -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
    <h1 style="font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 92px; line-height: 1.02; letter-spacing: -0.01em; margin: 0 0 26px 0; max-width: 20ch;">I take complex processes and make them <em style="font-style: italic; color: {{ accent }};">simple</em>.</h1>
    <p style="font-size: 24px; line-height: 1.45; color: rgba(250,249,246,0.6); margin: 0; max-width: 40ch;">A product manager who builds — mostly AI, hands-on.</p>
  </div>

  <!-- signature: resolved threads + signoff -->
  <div style="display: flex; align-items: flex-end; justify-content: space-between; gap: 40px;">
    <div style="display: flex; align-items: center; gap: 14px;">
      <span style="display: block; width: 9px; height: 9px; border-radius: 50%; background: {{ accent }};"></span>
      <span style="font-family: 'IBM Plex Mono', monospace; font-size: 17px; letter-spacing: 0.08em; color: rgba(250,249,246,0.82);">Yoav Assaf</span>
    </div>
    <div style="width: 380px;">
      {{ threads }}
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 630 },
  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#4A6B8A&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#4A6B8A&quot;, &quot;#C9683F&quot;, &quot;#5B7B65&quot;, &quot;#B0483A&quot;] }
}">
class Component extends DCLogic {
  rand(seed) {
    const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
    return x - Math.floor(x);
  }

  renderVals() {
    const accent = this.props.accentColor ?? '#4A6B8A';
    const count = 6;
    const W = 380, H = 96, N = 60;
    const accentIdx = Math.floor(count / 2);
    const paths = [];
    for (let i = 0; i < count; i++) {
      const ordY = (H / (count + 1)) * (i + 1);
      const f1 = 0.055 + this.rand(i * 3 + 1) * 0.03;
      const f2 = 0.11 + this.rand(i * 3 + 2) * 0.05;
      const p1 = this.rand(i * 7 + 4) * Math.PI * 2;
      const p2 = this.rand(i * 7 + 5) * Math.PI * 2;
      const amp = 22 + this.rand(i * 11 + 7) * 14;
      let d = '';
      for (let j = 0; j < N; j++) {
        const u = j / (N - 1);
        const x = 2 + u * (W - 4);
        const chaos = Math.pow(1 - u, 1.7);
        const wob = Math.sin(x * f1 + p1) + 0.6 * Math.sin(x * f2 + p2);
        const y = ordY + chaos * amp * wob;
        d += (j === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1);
      }
      const isAccent = i === accentIdx;
      paths.push(React.createElement('path', {
        key: i,
        d: d,
        fill: 'none',
        stroke: isAccent ? accent : 'rgba(250,249,246,0.26)',
        strokeWidth: isAccent ? 1.9 : 1.3,
        strokeLinecap: 'round',
        strokeLinejoin: 'round'
      }));
    }
    const threads = React.createElement('svg', {
      viewBox: '0 0 ' + W + ' ' + H,
      style: { display: 'block', width: '100%', height: 'auto' },
      'aria-hidden': 'true'
    }, paths);
    return { accent, threads };
  }
}
</script>
</body>
</html>
